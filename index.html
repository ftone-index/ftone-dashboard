<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    </style>
</head>
<body>
    <!-- ... all the existing HTML structure is exactly the same ... -->

    <script>
        // ... all existing JavaScript remains identical except for the sources rendering part ...

        // Inside the fetchFTN function, find the section that builds the sources list and replace it with this:

        const sources = data.sources || [];
        document.getElementById('sourcesCount').innerText = `(${sources.length})`;
        const listEl = document.getElementById('sourcesList');
        if (sources.length > 0) {
            listEl.innerHTML = sources.map(s => {
                const speaker = s.speaker ? `<strong>${s.speaker}</strong>, ` : '';
                return `<div class="source-item">
                    ${speaker}<a href="${s.url}" target="_blank">${s.title}</a>
                    <span style="color:#5a6577;"> (${s.chars} chars)</span>
                </div>`;
            }).join('');
        } else if (isCached) {
            listEl.innerHTML = '<div class="source-item">Source details unavailable for cached reading.</div>';
        }
    </script>
</body>
